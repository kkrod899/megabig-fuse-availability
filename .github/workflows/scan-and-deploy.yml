name: Scan and deploy availability

on:
  schedule:
    - cron: "0 9 * * *"
      timezone: "Asia/Tokyo"
  workflow_dispatch:

concurrency:
  group: megabig-scan-pages
  cancel-in-progress: false

jobs:
  scan:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SCAN_LIMIT_DAYS: "7"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Scan reservation page
        run: npm run scan

      - name: Save latest result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data/latest.json
          if git diff --cached --quiet; then
            echo "No result change"
          else
            git commit -m "data: update MegaBig availability [skip ci]"
            git push
          fi

      - name: Upload failure diagnostics
        if: ${{ failure() }}
        uses: actions/upload-artifact@v5
        with:
          name: megabig-scan-diagnostics-${{ github.run_id }}
          path: artifacts/
          if-no-files-found: ignore
          retention-days: 7

  build-pages:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: scan
    steps:
      - name: Checkout updated result
        uses: actions/checkout@v5

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    needs: build-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
