name: Scan and deploy availability

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "config/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/scan-and-deploy.yml"
  schedule:
    # GitHub's scheduler can delay or drop individual scheduled events. Run a
    # lightweight freshness check several times during 09:00-10:59 JST and do
    # the expensive scan only until today's result has been saved.
    # 00:07-01:47 UTC = 09:07-10:47 JST.
    - cron: "7,27,47 0-1 * * *"
  workflow_call:
  workflow_dispatch:

concurrency:
  group: megabig-scan-pages
  # A delayed fallback must never cancel a scan that is already collecting the
  # seven-day result. Once that scan finishes, the queued run exits at the
  # freshness check above.
  cancel-in-progress: false

jobs:
  check_freshness:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      should_scan: ${{ steps.freshness.outputs.should_scan }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check whether today's morning result already exists
        id: freshness
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          let generatedAt = Number.NaN;
          let latestStatus = null;
          try {
            const latest = JSON.parse(fs.readFileSync("site/data/latest.json", "utf8"));
            generatedAt = Date.parse(latest.generated_at);
            latestStatus = latest.scan?.status || null;
          } catch (error) {
            console.log(`Could not read latest result: ${error.message}`);
          }

          const now = new Date();
          const jstNow = new Date(now.getTime() + 9 * 60 * 60 * 1000);
          const todayEightAmJst = Date.UTC(
            jstNow.getUTCFullYear(),
            jstNow.getUTCMonth(),
            jstNow.getUTCDate(),
            -1,
            0,
            0
          );
          const alreadyFresh = Number.isFinite(generatedAt)
            && generatedAt >= todayEightAmJst
            && latestStatus === "success";
          const shouldScan = process.env.EVENT_NAME !== "schedule" || !alreadyFresh;

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `should_scan=${shouldScan}\n`);
          console.log({
            event: process.env.EVENT_NAME,
            generatedAt: Number.isFinite(generatedAt) ? new Date(generatedAt).toISOString() : null,
            latestStatus,
            todayEightAmJst: new Date(todayEightAmJst).toISOString(),
            alreadyFresh,
            shouldScan
          });
          NODE

  scan:
    needs: check_freshness
    if: ${{ needs.check_freshness.outputs.should_scan == 'true' }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      scan_succeeded: ${{ steps.scan_result.outcome == 'success' }}
    env:
      SCAN_LIMIT_DAYS: "7"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify fail-safe availability policy
        run: npm test

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Scan reservation page
        id: scan_result
        continue-on-error: true
        run: npm run scan

      - name: Save latest result
        if: ${{ always() }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data/latest.json
          if git diff --cached --quiet; then
            echo "No result change"
          else
            git commit -m "data: update MegaBig availability [skip ci]"
            git push
          fi

      - name: Upload failure diagnostics
        if: ${{ steps.scan_result.outcome == 'failure' }}
        uses: actions/upload-artifact@v5
        with:
          name: megabig-scan-diagnostics-${{ github.run_id }}
          path: artifacts/
          if-no-files-found: ignore
          retention-days: 7

  build-pages:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: scan
    steps:
      - name: Checkout updated result
        uses: actions/checkout@v5
        with:
          # The scan job commits latest.json after this workflow starts.
          # Explicitly read the current main branch instead of the original
          # workflow-triggering SHA so Pages always receives that new result.
          ref: main

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    needs: build-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  report-scan-failure:
    permissions: {}
    runs-on: ubuntu-latest
    needs:
      - scan
      - deploy-pages
    if: ${{ always() && needs.scan.result != 'skipped' && needs.scan.outputs.scan_succeeded != 'true' }}
    steps:
      - name: Mark incomplete scan for Actions visibility
        run: |
          echo "The latest partial result was published safely and will be retried by the next scheduled run."
          exit 1
