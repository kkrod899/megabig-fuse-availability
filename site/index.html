<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#fbeaf0">
  <title>フラットルーム空き確認</title>
  <link rel="stylesheet" href="./styles.css?v=20260720-pink-final">
</head>
<body>
  <main class="app-shell">
    <header class="page-header">
      <div class="header-meta">
        <span class="store-label">MEGA BIG 布施駅前店</span>
        <span class="freshness" id="freshness" data-state="loading">読込中</span>
      </div>
      <h1>フラットルーム</h1>
      <p class="today-label">今日の空き状況</p>
    </header>

    <section class="demo-notice" id="demo-notice" hidden>
      UI確認用データです。GitHub Actions接続後に実データへ切り替わります。
    </section>

    <section class="summary" aria-labelledby="summary-title">
      <p class="summary-label" id="summary-title">予約可能な時間帯</p>
      <p class="summary-value" id="earliest-slot">確認しています…</p>
    </section>

    <section class="week" aria-label="7日間の空き時間">
      <div class="day-list" id="day-list" aria-live="polite"></div>
    </section>

    <section class="error-panel" id="error-panel" role="alert" hidden>
      <strong>データを読み込めませんでした</strong>
      <p id="error-message">時間をおいて、もう一度更新してください。</p>
    </section>

    <footer class="page-footer">
      <a class="booking-action" id="booking-link" href="https://big-echo.tottokun.com/ownedmedia/ownedmedia_immediately_be/gXmZjh9iVXzm67v" target="_blank" rel="noopener noreferrer">
        公式ページで予約する
      </a>
      <p>空き状況は変わるため、予約前に公式画面で最終確認してください。</p>
    </footer>
  </main>

  <template id="day-template">
    <article class="day-row">
      <span class="date-chip">
        <span class="date-label"></span>
        <span class="weekday-label"></span>
      </span>
      <span class="day-time"></span>
    </article>
  </template>

  <script src="./config.js"></script>
  <script src="./app.js?v=20260720-pink-final"></script>
</body>
</html>
