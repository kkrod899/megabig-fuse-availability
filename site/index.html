<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f7f7f4">
  <title>フラットルーム空き確認</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="page-header">
      <div>
        <p class="eyebrow">MEGA BIG 布施駅前店</p>
        <h1>フラットルーム</h1>
      </div>
      <span class="freshness" id="freshness" data-state="loading">読込中</span>
    </header>

    <section class="demo-notice" id="demo-notice" hidden>
      UI確認用データです。GitHub Actions接続後に実データへ切り替わります。
    </section>

    <section class="condition-strip" aria-label="監視条件">
      <span id="party-size">2名</span>
      <span aria-hidden="true">・</span>
      <span id="duration">30分単位で確認</span>
      <span aria-hidden="true">・</span>
      <span id="time-range">10:00〜17:00</span>
    </section>

    <section class="summary" aria-labelledby="summary-title">
      <p class="summary-label" id="summary-title">最初に空いている時間</p>
      <p class="summary-value" id="earliest-slot">確認しています…</p>
      <p class="summary-meta" id="checked-at">最終確認時刻を取得中</p>
    </section>

    <div class="action-row">
      <button class="primary-action" id="reload-button" type="button">
        <span aria-hidden="true">↻</span>
        最新データを再読込
      </button>
    </div>

    <p class="refresh-note" id="refresh-note">
      毎朝9時時点の週間結果を表示します。目星を付けたら公式予約画面で最新状況を確認してください。
    </p>

    <section class="week" aria-labelledby="week-title">
      <div class="section-heading">
        <h2 id="week-title">向こう1週間</h2>
        <span id="available-days">—</span>
      </div>
      <div class="day-list" id="day-list" aria-live="polite"></div>
    </section>

    <section class="error-panel" id="error-panel" role="alert" hidden>
      <strong>データを読み込めませんでした</strong>
      <p id="error-message">時間をおいて、もう一度更新してください。</p>
    </section>

    <footer class="page-footer">
      <a id="booking-link" href="https://big-echo.tottokun.com/ownedmedia/ownedmedia_immediately_be/gXmZjh9iVXzm67v" target="_blank" rel="noopener noreferrer">
        公式予約画面を開く ↗
      </a>
      <p>空き状況は変わるため、予約前に公式画面で最終確認してください。</p>
    </footer>
  </main>

  <template id="day-template">
    <article class="day-card">
      <button class="day-toggle" type="button" aria-expanded="false">
        <span class="date-block">
          <span class="date-label"></span>
          <span class="weekday-label"></span>
        </span>
        <span class="day-overview">
          <span class="day-status"></span>
          <span class="day-summary"></span>
        </span>
        <span class="chevron" aria-hidden="true">⌄</span>
      </button>
      <div class="day-details" hidden>
        <p class="detail-caption"></p>
        <ul class="slot-list"></ul>
        <p class="day-checked"></p>
      </div>
    </article>
  </template>

  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
